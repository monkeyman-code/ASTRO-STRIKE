<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroStrike :: Elite Horizon</title>
    <style>
        :root { 
            --blue: #00d4ff; 
            --red: #ff2a6d; 
            --gold: #f5ed4d; 
            --bg: #020205;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }
        
        /* --- Starfield Background --- */
        #game-board { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            display: none; 
            background: radial-gradient(circle at bottom, #0a0a20 0%, #000 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: moveStars linear infinite;
        }
        @keyframes moveStars { from { transform: translateY(-100vh); } to { transform: translateY(100vh); } }

        /* --- Overlays & Horizontal Menus --- */
        .overlay { 
            position: absolute; top:0; left:0; width:100vw; height:100vh; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
            background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(15px); 
            text-align: center;
        }
        
        #pause-menu, #game-over-menu { display: none; }

        h1 { 
            font-size: clamp(2rem, 8vw, 4rem); letter-spacing: 8px; color: var(--blue); 
            text-shadow: 0 0 20px var(--blue); margin-bottom: 30px;
            font-weight: 900;
        }

        /* The "Straight Line" Button Container */
        .menu-row { 
            display: flex; 
            flex-direction: row; 
            justify-content: center; 
            align-items: center;
            gap: 15px; 
            flex-wrap: wrap; 
            max-width: 90vw;
            margin-top: 20px;
        }

        .btn { 
            background: var(--glass); border: 1px solid var(--blue); color: var(--blue); 
            padding: 15px 20px; font-size: 0.9rem; cursor: pointer; 
            width: 150px; text-transform: uppercase; font-weight: bold; 
            transition: 0.3s; border-radius: 4px; letter-spacing: 1px;
            backdrop-filter: blur(5px);
        }
        .btn:hover:not(:disabled) { background: var(--blue); color: #000; box-shadow: 0 0 30px var(--blue); }
        .btn:disabled { opacity: 0.2; cursor: wait; }

        /* --- HUD & Pause --- */
        #hud { 
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; box-sizing: border-box; z-index: 50;
        }

        .stat-box { font-size: 1.1rem; text-transform: uppercase; color: var(--blue); font-weight: bold; }
        .stat-val { color: white; text-shadow: 0 0 10px var(--blue); margin-left: 5px; }

        #pause-trigger {
            background: var(--glass); border: 1px solid var(--blue); color: var(--blue);
            padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;
            transition: 0.2s;
        }
        #pause-trigger:hover { background: var(--blue); color: black; }

        /* --- Gameplay Elements --- */
        #turret { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 50px; height: 50px; background: var(--blue); 
            clip-path: polygon(50% 0%, 20% 100%, 80% 100%);
            box-shadow: 0 0 30px var(--blue);
        }

        .word { position: absolute; font-size: 2.2rem; font-weight: 800; color: #fff; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .letter.active-target { color: var(--red); text-shadow: 0 0 15px var(--red); transform: scale(1.1); display: inline-block; }
        .letter.typed { opacity: 0.2; }

        .missile { position: absolute; width: 3px; height: 35px; background: #fff; box-shadow: 0 0 15px #fff; border-radius: 10px; z-index: 5; transition: all 0.1s linear; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1>ASTRO STRIKE</h1>
        <div id="loading-status" style="color:var(--gold)">🛰️ ESTABLISHING SATELLITE LINK...</div>
        <div class="menu-row" id="difficulty-row">
            <button class="btn" onclick="game.start('easy')" disabled>Easy</button>
            <button class="btn" onclick="game.start('normal')" disabled>Normal</button>
            <button class="btn" onclick="game.start('hard')" disabled>Hard</button>
            <button class="btn" onclick="game.start('expert')" disabled>Expert</button>
            <button class="btn" onclick="game.start('master')" disabled>Master</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay">
        <h1>PAUSED</h1>
        <div class="menu-row">
            <button class="btn" onclick="game.togglePause()">Resume</button>
            <button class="btn" style="color:var(--red); border-color:var(--red)" onclick="game.quit()">Abort</button>
        </div>
    </div>

    <div id="game-over-menu" class="overlay">
        <h1 style="color:var(--red)">MISSION FAILED</h1>
        <div id="final-stats" style="margin-bottom:20px; font-size: 1.5rem;"></div>
        <div class="menu-row">
            <button class="btn" id="retry-btn">Re-Launch</button>
            <button class="btn" onclick="game.quit()">Menu</button>
        </div>
    </div>

    <div id="game-board">
        <div id="hud">
            <div class="stat-box">Score: <span class="stat-val" id="score">0</span></div>
            <div class="stat-box">Streak: <span class="stat-val" id="streak-display">0</span></div>
            <div class="stat-box">Hull: <span class="stat-val" id="lives">3</span></div>
            <button id="pause-trigger" onclick="game.togglePause()">II PAUSE</button>
        </div>
        <div id="turret"></div>
    </div>

    <script>
        const DICT_URL = "https://cdn.jsdelivr.net/gh/dwyl/english-words@master/words_alpha.txt";

        const game = {
            active: false, paused: false, score: 0, lives: 3, streak: 0,
            currentWord: null, difficulty: 'normal',
            megaDict: { easy: [], normal: [], hard: [], expert: [], master: [] },
            speeds: { easy: 0.8, normal: 1.4, hard: 2.2, expert: 3.5, master: 5.0 },
            starSpeed: { easy: "5s", normal: "3s", hard: "2s", expert: "1s", master: "0.5s" },

            async init() {
                // Create Background Stars
                const board = document.getElementById('game-board');
                for(let i=0; i<80; i++) {
                    let star = document.createElement('div');
                    star.className = 'star';
                    star.style.width = Math.random() * 3 + 'px';
                    star.style.height = star.style.width;
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.top = Math.random() * 100 + 'vh';
                    star.style.animationDuration = "4s";
                    board.appendChild(star);
                }

                try {
                    const res = await fetch(DICT_URL);
                    const text = await res.text();
                    const words = text.split('\n');
                    words.forEach(w => {
                        const word = w.trim().toUpperCase();
                        if (word.length >= 3 && word.length <= 4) this.megaDict.easy.push(word);
                        else if (word.length >= 5 && word.length <= 6) this.megaDict.normal.push(word);
                        else if (word.length >= 7 && word.length <= 9) this.megaDict.hard.push(word);
                        else if (word.length >= 10 && word.length <= 12) this.megaDict.expert.push(word);
                        else if (word.length >= 13) this.megaDict.master.push(word);
                    });
                    document.getElementById('loading-status').innerText = "✅ ALL SYSTEMS ONLINE";
                    document.querySelectorAll('.btn').forEach(b => b.disabled = false);
                } catch (e) {
                    document.getElementById('loading-status').innerText = "⚠️ OFFLINE MODE";
                    this.megaDict.easy = ["STAR", "CORE", "VOID", "SHIP"];
                    document.querySelectorAll('.btn').forEach(b => b.disabled = false);
                }
            },

            start(diff) {
                this.difficulty = diff; this.active = true; this.paused = false;
                this.score = 0; this.lives = 3; this.streak = 0;
                
                // Set Star Speed based on difficulty
                document.querySelectorAll('.star').forEach(s => s.style.animationDuration = this.starSpeed[diff]);

                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('game-over-menu').style.display = 'none';
                document.getElementById('game-board').style.display = 'block';
                this.updateUI(); this.spawn(); this.loop();
            },

            spawn() {
                if (!this.active) return;
                if (this.currentWord) this.currentWord.el.remove();
                const pool = this.megaDict[this.difficulty].length > 0 ? this.megaDict[this.difficulty] : this.megaDict.easy;
                const text = pool[Math.floor(Math.random() * pool.length)];
                const el = document.createElement('div');
                el.className = 'word';
                el.style.left = Math.random() * (window.innerWidth - 300) + 50 + "px";
                el.style.top = "-100px";
                const letters = text.split('').map((char, i) => {
                    const span = document.createElement('span');
                    span.innerText = char; span.className = 'letter';
                    if (i === 0) span.classList.add('active-target');
                    el.appendChild(span); return span;
                });
                document.getElementById('game-board').appendChild(el);
                this.currentWord = { el, text, letters, y: -100, index: 0 };
            },

            loop() {
                if (!this.active || this.paused) return;
                if (this.currentWord) {
                    this.currentWord.y += this.speeds[this.difficulty];
                    this.currentWord.el.style.top = this.currentWord.y + "px";
                    if (this.currentWord.y > window.innerHeight - 110) {
                        this.lives--; this.streak = 0; this.updateUI();
                        if (this.lives <= 0) this.gameOver(); else this.spawn();
                    }
                }
                requestAnimationFrame(() => this.loop());
            },

            handleInput(key) {
                if (!this.active || this.paused || !this.currentWord) return;
                if (key === this.currentWord.text[this.currentWord.index]) {
                    this.fireMissile(this.currentWord.letters[this.currentWord.index]);
                    this.currentWord.index++;
                    if (this.currentWord.index < this.currentWord.text.length) {
                        this.currentWord.letters[this.currentWord.index].classList.add('active-target');
                    } else {
                        this.score += (this.currentWord.text.length * 10) + (this.streak * 5);
                        this.streak++; this.updateUI(); this.spawn();
                    }
                } else { this.streak = 0; this.updateUI(); }
            },

            fireMissile(target) {
                const m = document.createElement('div');
                m.className = 'missile';
                const rect = target.getBoundingClientRect();
                m.style.left = "50vw"; m.style.bottom = "80px";
                document.getElementById('game-board').appendChild(m);
                setTimeout(() => { 
                    m.style.left = (rect.left + rect.width/2) + "px"; 
                    m.style.top = (rect.top + rect.height/2) + "px"; 
                }, 10);
                setTimeout(() => { target.classList.add('typed'); m.remove(); }, 120);
            },

            updateUI() {
                document.getElementById('score').innerText = this.score;
                document.getElementById('lives').innerText = this.lives;
                document.getElementById('streak-display').innerText = this.streak;
            },

            togglePause() {
                this.paused = !this.paused;
                document.getElementById('pause-menu').style.display = this.paused ? 'flex' : 'none';
                if (!this.paused) this.loop();
            },

            gameOver() {
                this.active = false;
                document.getElementById('final-stats').innerHTML = `SCORE: ${this.score}<br>MAX STREAK: ${this.streak}`;
                document.getElementById('game-over-menu').style.display = 'flex';
                document.getElementById('retry-btn').onclick = () => this.start(this.difficulty);
            },

            quit() {
                this.active = false; if (this.currentWord) this.currentWord.el.remove();
                this.currentWord = null;
                document.getElementById('game-board').style.display = 'none';
                document.getElementById('pause-menu').style.display = 'none';
                document.getElementById('game-over-menu').style.display = 'none';
                document.getElementById('main-menu').style.display = 'flex';
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") game.togglePause();
            else game.handleInput(e.key.toUpperCase());
        });

        game.init();
    </script>
</body>
</html>
